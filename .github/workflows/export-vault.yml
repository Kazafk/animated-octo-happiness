name: Auto-Export Obsidian Vault

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Export from Obsidian Vault
        env:
          OBSIDIAN_API_URL: ${{ secrets.OBSIDIAN_API_URL }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          PROJECTS_LIST: ${{ vars.PROJECTS_LIST || 'Agentic Testing Framework,Carto Cobol,IA & Management,Pacbase-transpiler,Mainframe Virtualization/mvs-tk5,Mainframe Virtualization/suite3270-4.5' }}
          GIT_AUTO_COMMIT: 'false'
        run: node scripts/auto-export-vault.js
        continue-on-error: true

      - name: Commit export changes (if any)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if [[ -n $(git status -s projects/) ]]; then
            git add projects/
            git commit -m "chore: auto-export projects from Obsidian vault"
            git push
          else
            echo "No changes to commit"
          fi
        continue-on-error: true

      - name: Build static site
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
